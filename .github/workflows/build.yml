name: Build, push and deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Checkout config-repo
        uses: actions/checkout@v4
        with:
          repository: isak0016/gb-config
          path: ./gb-config
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Logga in på GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Bygg och pusha backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Containerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/guestbook-backend:${{ github.sha }}

      - name: Bygg och pusha frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Containerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/guestbook-frontend:${{ github.sha }}

      - name: Installera oc
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Logga in på OpenShift
        run: |
          oc login --token=${{ secrets.OC_TOKEN }} \
                   --server=${{ secrets.OC_SERVER }}

      - name: Uppdatera image-taggar i manifestfiler
        run: |
          sed -i "s|ghcr.io/isak0016/guestbook-backend:.*|ghcr.io/isak0016/guestbook-backend:${{ github.sha }}|g" k8s/backend.yaml
          sed -i "s|ghcr.io/isak0016/guestbook-frontend:.*|ghcr.io/isak0016/guestbook-frontend:${{ github.sha }}|g" k8s/frontend.yaml
        working-directory: ./gb-config

      - name: Driftsätt till OpenShift
        run: |
          oc apply -f k8s/
        working-directory: ./gb-config
